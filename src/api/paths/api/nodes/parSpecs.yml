get:
  summary: Get node parameter specifications
  description: >-
    Retrieves the full parameter specifications for a node (style, page, label,
    numeric range, menu entries, current value). Powers the interactive
    parameter editor UI.
  operationId: get_node_par_specs
  parameters:
    - description: Absolute path to the node to inspect. e.g., "/project1/text1"
      in: query
      name: nodePath
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Node parameter specifications
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - data
              - error
            properties:
              success:
                type: boolean
                description: Whether the operation was successful
              data:
                nullable: true
                $ref: ../../../index.yml#/components/schemas/TdNodeParSpecs
              error:
                nullable: true
                type: string
                description: Error message if the operation was not successful
